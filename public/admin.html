<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — She Can Foundation</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="assets/logo.png" type="image/png">
</head>
<body>
    <div class="ambient-glow ambient-glow-1"></div>
    <div class="ambient-glow ambient-glow-2"></div>

    <nav class="navbar">
        <a href="/" class="nav-brand">
            <img src="assets/logo.png" alt="Logo">
            <span>She Can Foundation</span>
        </a>
        <ul class="nav-links">
            <li><a href="/">Back to Site</a></li>
            <li><button class="btn btn-sm btn-outline hidden" id="logoutBtn">Logout</button></li>
        </ul>
    </nav>

    <!-- Login View -->
    <div id="loginView">
        <div class="login-container">
            <div class="login-card">
                <h2>Admin Login</h2>
                <p class="subtitle">Access the dashboard to manage submissions</p>
                <div class="login-error" id="loginError">Invalid credentials</div>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" placeholder="Enter username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter password" required>
                    </div>
                    <button type="submit" class="btn btn-primary submit-btn" id="loginBtn">
                        <span class="btn-text">Sign In</span>
                        <div class="spinner"></div>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Dashboard View -->
    <div id="dashboardView" class="hidden">
        <div class="admin-container">
            <div class="dashboard-header">
                <h2>Dashboard</h2>
                <button class="btn btn-sm btn-outline" id="refreshBtn">Refresh</button>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    </div>
                    <div class="stat-value" id="totalStat">0</div>
                    <div class="stat-label">Total Submissions</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    </div>
                    <div class="stat-value" id="todayStat">0</div>
                    <div class="stat-label">Today's Submissions</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                    </div>
                    <div class="stat-value" id="unreadStat">0</div>
                    <div class="stat-label">Unread Messages</div>
                </div>
            </div>

            <div class="table-card">
                <div class="table-header">
                    <h3>All Submissions</h3>
                </div>
                <div class="table-wrapper">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Subject</th>
                                <th>Date</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="submissionsBody">
                            <tr><td colspan="6" class="empty-state">Loading submissions...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- View Submission Modal -->
    <div class="modal-overlay" id="viewModal">
        <div class="modal-content view-modal-content">
            <h3 style="margin-bottom:1.25rem">Submission Details</h3>
            <div id="viewDetails"></div>
            <button class="btn btn-primary" id="closeViewModal" style="width:100%;margin-top:1.25rem">Close</button>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
